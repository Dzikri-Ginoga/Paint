<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 PaintPro</title>
    <!-- Menautkan file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Topbar -->
    <div class="topbar">
        <div class="logo">Paint</div>
        <div class="menu-items">
            <span>File</span><span>Edit</span><span>View</span><span>Help</span>
        </div>
    </div>

    <!-- Workspace -->
    <div class="workspace">
        <!-- Leftbar (Tools) -->
        <div class="leftbar" id="toolBox">
            <button class="tool-btn active" data-tool="brush" title="Brush">✎</button>
            <button class="tool-btn" data-tool="eraser" title="Eraser">▱</button>
            <button class="tool-btn" data-tool="fill" title="Fill">▧</button>
            <button class="tool-btn" data-tool="line" title="Line">╱</button>
            <button class="tool-btn" data-tool="rect" title="Rectangle">▭</button>
            <button class="tool-btn" data-tool="circle" title="Circle">◯</button>
            <button class="tool-btn" data-tool="ellipse" title="Ellipse">⬭</button>
            <button class="tool-btn" data-tool="select" title="Select">⬚</button>
        </div>

        <!-- Canvas -->
        <div class="canvas-container">
            <canvas id="mainCanvas" width="750" height="480"></canvas>
            <canvas id="draftCanvas" width="750" height="480"></canvas>
        </div>

        <!-- Rightbar -->
        <div class="rightbar">
            <div class="section-title">Ukuran Kuas</div>
            <div class="brush-size-container">
                <span>ஃ</span>
                <input type="range" id="brushSize" min="1" max="50" value="4">
                <span class="size-label" id="brushSizeLabel">4px</span>
            </div>

            <div class="divider"></div>

            <div class="section-title">Warna</div>
            <div class="palette" id="paletteBox">
                <!-- Swatches generated by JS -->
            </div>

            <div class="divider"></div>

            <div class="section-title">Aksi Kanvas</div>
            <button class="action-btn btn-blue" id="btnExport">Export PNG</button>
            <button class="action-btn btn-green" id="btnGray">Grayscale Filter</button>
            <button class="action-btn btn-orange" id="btnApply">Terapkan Seleksi</button>
            <div id="transformHints">Gunakan Panah Kiri/Kanan (Rotasi), Atas/Bawah (Skala)</div>
            <button class="action-btn btn-red" id="btnClear">Bersihkan (Danger)</button>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
